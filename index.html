<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PomoFlow - Pomodoro Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍅 PomoFlow</h1>
            <p>Stay focused, be productive</p>
        </header>

        <div class="timer-section">
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-controls">
                <button id="startBtn" class="btn primary">Start</button>
                <button id="pauseBtn" class="btn secondary" disabled>Pause</button>
                <button id="resetBtn" class="btn secondary">Reset</button>
            </div>
            <div class="timer-modes">
                <button class="mode-btn active" data-mode="pomodoro">Pomodoro</button>
                <button class="mode-btn" data-mode="shortBreak">Short Break</button>
                <button class="mode-btn" data-mode="longBreak">Long Break</button>
            </div>
        </div>

        <div class="stats-section">
            <h2>Statistics</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value" id="pomodoroCount">0</span>
                    <span class="stat-label">Pomodoros</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="totalMinutes">0</span>
                    <span class="stat-label">Total Minutes</span>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <button id="settingsBtn" class="btn settings-btn">⚙️ Settings</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
